<!DOCTYPE html>
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>所有学术成果 | Publications</title>
    <style>
        :root { --primary-color: #00468b; --bg-body: #f8fafc; --bg-surface: #ffffff; --text-main: #1e293b; --text-secondary: #475569; --border-color: #e2e8f0; --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05); --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06); }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background-color: var(--bg-body); color: var(--text-main); line-height: 1.6; }
        
        nav { background-color: var(--bg-surface); border-bottom: 1px solid var(--border-color); position: sticky; top: 0; z-index: 100; padding: 1.2rem 5%; display: flex; justify-content: space-between; align-items: center; }
        .nav-links a { text-decoration: none; color: var(--text-secondary); font-weight: 600; display: flex; align-items: center; gap: 0.5rem; }
        .nav-links a:hover { color: var(--primary-color); }
        .lang-toggle { background: none; border: 1px solid var(--border-color); padding: 0.4rem 0.8rem; border-radius: 4px; font-size: 0.9rem; font-weight: 600; cursor: pointer; }

        .container { max-width: 1000px; margin: 4rem auto; padding: 0 5%; min-height: 70vh; }
        .page-title { font-size: 2.5rem; font-weight: 700; margin-bottom: 2rem; color: var(--text-main); }

        /* ========================================= */
        /* 搜索框样式 */
        /* ========================================= */
        .search-container { margin-bottom: 3rem; position: relative; }
        #pubSearch { 
            width: 100%; 
            padding: 1rem 1.5rem; 
            font-size: 1.1rem; 
            border: 2px solid var(--border-color); 
            border-radius: 12px; 
            background-color: var(--bg-surface);
            transition: all 0.3s;
            outline: none;
            box-shadow: var(--shadow-sm);
        }
        #pubSearch:focus { 
            border-color: var(--primary-color); 
            box-shadow: 0 0 0 4px rgba(0, 70, 139, 0.1); 
        }

        .pub-list { display: flex; flex-direction: column; gap: 2rem; }
        .pub-item { background-color: var(--bg-surface); border: 1px solid var(--border-color); border-radius: 12px; padding: 2rem; box-shadow: var(--shadow-sm); }
        .pub-year { font-size: 1.1rem; font-weight: 700; color: var(--primary-color); border-bottom: 2px solid var(--primary-color); display: inline-block; margin-bottom: 1rem; }
        .pub-content h3 { font-size: 1.2rem; margin-bottom: 0.5rem; }
        .pub-authors { font-weight: 500; font-size: 0.95rem; }
        .pub-journal { color: var(--text-secondary); font-style: italic; margin-bottom: 1.5rem; font-size: 0.9rem; }
        
        .pub-link-btn { text-decoration: none; color: var(--primary-color); font-weight: 600; font-size: 0.85rem; border: 1px solid var(--primary-color); padding: 0.4rem 1.2rem; border-radius: 4px; margin-right: 0.5rem; transition: 0.2s; }
        .pub-link-btn:hover { background-color: var(--primary-color); color: #ffffff; }
        .pub-link-btn.doi-link { border-color: #64748b; color: #64748b; }
        .pub-link-btn.doi-link:hover { background-color: #64748b; color: #ffffff; }

        .no-results { text-align: center; padding: 3rem; color: var(--text-secondary); font-size: 1.2rem; }
        footer { text-align: center; padding: 3rem; border-top: 1px solid var(--border-color); margin-top: 4rem; }
    </style>
</head>
<body>

    <nav>
        <div class="nav-links"><a href="index.html" data-i18n="nav.backHome"></a></div>
        <button class="lang-toggle" id="langToggleBtn" data-i18n="nav.langBtn"></button>
    </nav>

    <div class="container">
        <h1 class="page-title" data-i18n="nav.allPubs"></h1>
        
        <div class="search-container">
            <input type="text" id="pubSearch" placeholder="搜索论文...">
        </div>

        <div class="pub-list" id="pub-container"></div>
    </div>

    <footer><p data-i18n="footer"></p></footer>

    <script src="data/data.js"></script>
    <script>
        let currentLang = 'zh';
        let searchQuery = '';

        const getText = (node, lang) => {
            if (!node) return '';
            if (typeof node === 'string') return node;
            return node[lang] || node['zh'] || '';
        };

        document.addEventListener("DOMContentLoaded", () => {
            const savedLang = localStorage.getItem('preferredLang');
            if (savedLang) {
                currentLang = savedLang;
                document.documentElement.lang = currentLang === 'zh' ? 'zh-CN' : 'en-US';
            }

            // 监听搜索输入
            const searchInput = document.getElementById('pubSearch');
            searchInput.addEventListener('input', (e) => {
                searchQuery = e.target.value.toLowerCase();
                renderPage();
            });

            if (typeof websiteData !== 'undefined') {
                renderPage();
            }
        });

        function renderPage() {
            // 渲染静态翻译
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const keys = el.getAttribute('data-i18n').split('.');
                let node = websiteData;
                keys.forEach(k => { node = node ? node[k] : undefined });
                
                // 特殊处理输入框的 placeholder
                if (el.id === 'pubSearch') {
                    el.placeholder = getText(node, currentLang);
                } else {
                    el.innerHTML = getText(node, currentLang);
                }
            });

            const allPubs = websiteData.pubData || [];

            // 【核心改进】：过滤逻辑
            const filteredPubs = allPubs.filter(pub => {
                const title = (getText(pub.title, 'zh') + getText(pub.title, 'en')).toLowerCase();
                const authors = (getText(pub.authors, 'zh') + getText(pub.authors, 'en')).toLowerCase();
                const journal = (getText(pub.journal, 'zh') + getText(pub.journal, 'en')).toLowerCase();
                const year = String(pub.year);
                
                return title.includes(searchQuery) || 
                       authors.includes(searchQuery) || 
                       journal.includes(searchQuery) || 
                       year.includes(searchQuery);
            });

            const container = document.getElementById('pub-container');
            
            if (filteredPubs.length === 0) {
                container.innerHTML = `<div class="no-results">${currentLang === 'zh' ? '没有找到匹配的成果' : 'No matching publications found'}</div>`;
                return;
            }

            container.innerHTML = filteredPubs.map(pub => {
                const cleanDoi = pub.doi ? String(pub.doi).replace(/^(https?:\/\/)?doi\.org\//, '') : '';
                const doiHtml = cleanDoi ? `<a href="https://doi.org/${cleanDoi}" class="pub-link-btn doi-link" target="_blank" rel="noopener noreferrer">🔗 DOI</a>` : '';

                return `
                <div class="pub-item">
                    <div class="pub-year">${getText(pub.year, currentLang)}</div>
                    <div class="pub-content">
                        <h3>${getText(pub.title, currentLang)}</h3>
                        <p class="pub-authors">${getText(pub.authors, currentLang)}</p>
                        <p class="pub-journal">${getText(pub.journal, currentLang)}</p>
                        <div class="pub-links">
                            <a href="${pub.pdfLink || '#'}" class="pub-link-btn" target="_blank" rel="noopener noreferrer">📄 PDF (${getText(pub.pdfSize, currentLang)})</a>
                            ${doiHtml}
                        </div>
                    </div>
                </div>`;
            }).join('');
        }
    </script>
</body>
</html>
