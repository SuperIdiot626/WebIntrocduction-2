<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>所有学术成果 | Publications</title>
    <style>
        :root { --primary-color: #00468b; --bg-body: #f8fafc; --bg-surface: #ffffff; --text-main: #1e293b; --text-secondary: #475569; --border-color: #e2e8f0; --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05); --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06); --nav-height: 70px; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background-color: var(--bg-body); color: var(--text-main); line-height: 1.6; transition: background-color 0.3s, color 0.3s; }
        
        nav { background-color: var(--bg-surface); border-bottom: 1px solid var(--border-color); position: sticky; top: 0; z-index: 100; padding: 1.2rem 5%; display: flex; justify-content: space-between; align-items: center; }
        .nav-links { display: flex; gap: 2rem; align-items: center; }
        .nav-links a { text-decoration: none; color: var(--text-secondary); font-weight: 600; transition: color 0.2s; cursor: pointer; display: flex; align-items: center; gap: 0.5rem; }
        .nav-links a:hover { color: var(--primary-color); }
        .lang-toggle { background: none; border: 1px solid var(--border-color); padding: 0.4rem 0.8rem; border-radius: 4px; font-size: 0.9rem; font-weight: 600; color: var(--text-main); cursor: pointer; transition: all 0.2s; }
        .lang-toggle:hover { border-color: var(--primary-color); color: var(--primary-color); }

        .container { max-width: 1000px; margin: 4rem auto; padding: 0 5%; min-height: 70vh; }
        .page-title { font-size: 2.5rem; font-weight: 700; color: var(--text-main); margin-bottom: 3rem; border-bottom: 2px solid var(--border-color); padding-bottom: 1rem; }

        /* 独立页面的垂直列表排版 */
        .pub-list { display: flex; flex-direction: column; gap: 2rem; }
        .pub-item { background-color: var(--bg-surface); border: 1px solid var(--border-color); border-radius: 12px; padding: 2.5rem; display: flex; flex-direction: column; box-shadow: var(--shadow-sm); transition: transform 0.2s, box-shadow 0.2s; }
        .pub-item:hover { box-shadow: var(--shadow-md); transform: translateY(-3px); }
        
        .pub-year { font-size: 1.2rem; font-weight: 700; color: var(--primary-color); margin-bottom: 1rem; border-bottom: 2px solid var(--primary-color); display: inline-block; align-self: flex-start; padding-bottom: 0.2rem; }
        .pub-content { flex: 1; display: flex; flex-direction: column; }
        .pub-content h3 { font-size: 1.25rem; color: var(--text-main); margin-bottom: 0.8rem; line-height: 1.5; margin-top: 0; }
        .pub-authors { color: var(--text-main); font-weight: 500; margin-bottom: 0.5rem; font-size: 1rem; }
        .pub-journal { color: var(--text-secondary); font-style: italic; margin-bottom: 1.5rem; font-size: 0.95rem; }
        .pub-links { display: flex; gap: 1rem; flex-wrap: wrap; margin-top: auto; }
        .pub-link-btn { text-decoration: none; color: var(--primary-color); font-weight: 600; font-size: 0.85rem; border: 1px solid var(--primary-color); padding: 0.4rem 1.2rem; border-radius: 4px; transition: all 0.2s; }
        .pub-link-btn:hover { background-color: var(--primary-color); color: #ffffff; }

        footer { text-align: center; padding: 3rem 5%; border-top: 1px solid var(--border-color); color: var(--text-secondary); margin-top: 4rem; background-color: var(--bg-surface); }
    </style>
</head>
<body>

    <nav>
        <div class="nav-links">
            <a href="index.html" data-i18n="nav.backHome"></a>
        </div>
        <button class="lang-toggle" id="langToggleBtn" data-i18n="nav.langBtn"></button>
    </nav>

    <div class="container">
        <h1 class="page-title" data-i18n="nav.allPubs"></h1>
        <div class="pub-list" id="pub-container">
            </div>
    </div>

    <footer><p data-i18n="footer"></p></footer>

    <script src="data/data.js"></script>
    <script>
        let currentLang = 'zh';

        document.addEventListener("DOMContentLoaded", () => {
            // 尝试从 localStorage 恢复用户之前在首页选择的语言偏好
            const savedLang = localStorage.getItem('preferredLang');
            if (savedLang === 'en' || savedLang === 'zh') {
                currentLang = savedLang;
                document.documentElement.lang = currentLang === 'zh' ? 'zh-CN' : 'en-US';
            }

            if (typeof websiteData !== 'undefined') {
                renderPage();
            } else {
                document.getElementById('pub-container').innerHTML = `<p style="color: red;">无法读取数据文件。</p>`;
                return;
            }
            
            document.getElementById('langToggleBtn').addEventListener('click', () => {
                currentLang = currentLang === 'zh' ? 'en' : 'zh';
                document.documentElement.lang = currentLang === 'zh' ? 'zh-CN' : 'en-US';
                // 保存语言偏好，让首页和详情页的语言保持同步
                localStorage.setItem('preferredLang', currentLang);
                renderPage();
            });
        });

        function renderPage() {
            // 替换静态文本
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const keys = el.getAttribute('data-i18n').split('.');
                let node = websiteData;
                keys.forEach(k => { node = node[k] ? node[k] : node });
                if (node && node[currentLang]) el.innerHTML = node[currentLang];
            });

            // 全量渲染学术成果（没有任何 slice 截断）
            document.getElementById('pub-container').innerHTML = websiteData.pubData.map((pub) => `
                <div class="pub-item">
                    <div class="pub-year">${pub.year}</div>
                    <div class="pub-content">
                        <h3>${pub.title[currentLang]}</h3>
                        <p class="pub-authors">${pub.authors[currentLang]}</p>
                        <p class="pub-journal">${pub.journal[currentLang]}</p>
                        <div class="pub-links">
                            <a href="#" class="pub-link-btn" download>📄 PDF (${pub.pdfSize})</a>
                            ${pub.hasDoi ? `<a href="#" class="pub-link-btn" target="_blank" rel="noopener noreferrer">🔗 DOI</a>` : ''}
                        </div>
                    </div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
