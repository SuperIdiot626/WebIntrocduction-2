<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统架构研发团队 | Research Group</title>
    <style>
        :root { --primary-color: #00468b; --bg-body: #f8fafc; --bg-surface: #ffffff; --text-main: #1e293b; --text-secondary: #475569; --border-color: #e2e8f0; --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05); --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06); --nav-height: 70px; --anim-duration: 1.2s; --anim-stagger: 0.15s; --anim-ease: cubic-bezier(0.22, 1, 0.36, 1); }
        html { scroll-behavior: smooth; scroll-padding-top: var(--nav-height); }
        @media (prefers-reduced-motion: reduce) { html { scroll-behavior: auto; } }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background-color: var(--bg-body); color: var(--text-main); line-height: 1.6; transition: background-color 0.3s, color 0.3s; overflow-x: hidden; }
        .fade-in-up { opacity: 0; transform: translateY(30px); transition: opacity var(--anim-duration) var(--anim-ease) calc(var(--anim-stagger) * var(--i, 0)), transform var(--anim-duration) var(--anim-ease) calc(var(--anim-stagger) * var(--i, 0)); }
        .fade-in-up.is-visible { opacity: 1; transform: translateY(0); }
        
        nav { background-color: var(--bg-surface); border-bottom: 1px solid var(--border-color); position: sticky; top: 0; z-index: 100; padding: 1.2rem 5%; display: flex; justify-content: space-between; align-items: center; }
        .nav-brand { font-size: 1.25rem; font-weight: 600; color: var(--primary-color); }
        .nav-links { display: flex; gap: 2rem; align-items: center; }
        .nav-links a { text-decoration: none; color: var(--text-secondary); font-weight: 500; transition: color 0.2s; cursor: pointer; }
        .nav-links a:hover { color: var(--primary-color); }
        .lang-toggle { background: none; border: 1px solid var(--border-color); padding: 0.4rem 0.8rem; border-radius: 4px; font-size: 0.9rem; font-weight: 600; color: var(--text-main); cursor: pointer; transition: all 0.2s; }
        .lang-toggle:hover { border-color: var(--primary-color); color: var(--primary-color); }
        .btn-primary { display: inline-block; background-color: var(--primary-color); color: #ffffff; padding: 0.75rem 2rem; border-radius: 6px; text-decoration: none; font-weight: 600; transition: background-color 0.2s; border: none; cursor: pointer; font-size: 1rem; }
        .btn-primary:hover { background-color: #003366; }
        
        section { padding: 5rem 5%; max-width: 1200px; margin: 0 auto; }
        .section-title { font-size: 2rem; font-weight: 600; margin-bottom: 3rem; text-align: left; color: var(--text-main); border-bottom: 2px solid var(--border-color); padding-bottom: 0.5rem; }
        
        /* 研究领域 */
        #architecture { max-width: 1600px; }
        #architecture .section-title { max-width: 1080px; margin-left: auto; margin-right: auto; }
        .research-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 2rem; max-width: 1500px; margin: 0 auto; }
        .research-grid .card { background-color: var(--bg-surface); border: 1px solid var(--border-color); border-radius: 12px; box-shadow: var(--shadow-sm); transition: transform 0.2s, box-shadow 0.2s; flex: 0 0 calc((100% - (2rem * (var(--cards-per-row, 4) - 1))) / var(--cards-per-row, 4)); padding: 3rem 2rem; display: flex; flex-direction: column; }
        .research-grid .card:hover { transform: translateY(-5px); box-shadow: var(--shadow-md); }
        .research-grid .card-icon { font-size: 3.5rem; margin-bottom: 1.5rem; display: block; }
        .research-grid .card h3 { color: var(--text-main); font-size: 1.4rem; margin-bottom: 1rem; }
        .research-grid .card p { color: var(--text-secondary); font-size: 1.05rem; line-height: 1.7; flex-grow: 1; margin: 0; max-width: 65ch; }

        /* 团队成员 */
        /* 新增：团队分级标题的样式 */
        .team-category { margin-bottom: 4rem; }
        .team-category:last-child { margin-bottom: 0; }
        .team-category-title { 
            font-size: 1.4rem; 
            color: var(--primary-color); 
            margin-bottom: 2rem; 
            padding-bottom: 0.5rem; 
            border-bottom: 1px solid var(--border-color);
            display: inline-block;
        }

        /*.team-grid { display: grid; gap: 2rem; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); }*/
        .team-category .team-grid { 
            display: flex; 
            flex-wrap: wrap; 
            justify-content: center; /* 居中对齐，让数量不足时自动向中间靠拢 */
            gap: 2rem; 
        }
        .team-card { 
            background-color: var(--bg-surface); 
            border: 1px solid var(--border-color); 
            border-radius: 8px; 
            box-shadow: var(--shadow-sm); 
            transition: transform 0.2s, box-shadow 0.2s; 
            padding: 2.5rem 2rem; 
            text-align: center; 
            /* 核心：读取 HTML 行内注入的变量进行动态宽度分割 */
            flex: 0 0 calc((100% - (2rem * (var(--team-cards-per-row, 4) - 1))) / var(--team-cards-per-row, 4));
        }
        .team-card:hover { transform: translateY(-5px); box-shadow: var(--shadow-md); }
        .team-card h4 { color: var(--text-main); margin-bottom: 1rem; }
        .team-card p { color: var(--text-secondary); font-size: 0.95rem; margin: 0; }
        /* 为头像容器添加 overflow: hidden 裁剪多余图片边缘 */
        .avatar { width: 96px; height: 96px; background-color: var(--border-color); border-radius: 50%; margin: 0 auto 1.5rem auto; display: flex; align-items: center; justify-content: center; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        /* 强制内部图片等比例铺满并裁剪 */
        .avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; display: block; }
        .team-card .role { font-size: 0.9rem; color: var(--primary-color); font-weight: 600; margin-bottom: 1rem; }
        
        
        /* ========================================= */
        /* 新增：领导专属的横向宽幅卡片样式          */
        /* ========================================= */
        .team-card-leader {
            display: flex;
            flex-direction: row;
            align-items: center; 
            text-align: left; /* 文字左对齐 */
            gap: 3rem; /* 头像与文字的间距 */
            padding: 3rem 4rem;
        }
        
        /* 针对横向卡片里的头像，取消居中并稍微放大 */
        .team-card-leader .avatar {
            margin: 0; 
            width: 120px; 
            height: 120px;
            flex-shrink: 0;
            font-size: 2.5rem;
        }

        .team-card-leader .leader-info {
            flex: 1; /* 让文字部分占满右侧剩余空间 */
        }

        .team-card-leader h4 {
            font-size: 1.5rem; /* 名字稍微放大 */
            margin-bottom: 0.5rem;
        }

        /* 移动端适配：屏幕变窄时，强行把横向卡片折叠回上下结构 */
        @media (max-width: 768px) {
            .team-card-leader {
                flex-direction: column;
                text-align: center;
                gap: 1.5rem;
                padding: 2.5rem 2rem;
            }
            .team-card-leader .avatar { margin: 0 auto; }
        }





        /* 找到底部的媒体查询 @media，将 .team-card 加进响应式强覆盖中 */
        @media (max-width: 1024px) { 
            .research-grid .card, .team-card { flex: 0 0 calc((100% - 2rem) / 2); } 
        }
        @media (max-width: 600px) { 
            .nav-links a { display: none; } 
            .research-grid .card, .team-card { flex: 0 0 100%; } 
            .pub-item { flex: 0 0 85%; } 
            .contact-container { grid-template-columns: 1fr; gap: 3rem; padding: 2rem; } 
        }
        /* ========================================= */
        /* 修改点 1：学术成果横向滚动布局 */
        /* ========================================= */
        .pub-list { 
            display: flex; 
            gap: 2rem; 
            overflow-x: auto; /* 允许横向滚动 */
            padding-bottom: 2rem; /* 给下方的滚动条留出呼吸空间 */
            padding-top: 1rem;
            scroll-snap-type: x mandatory; /* 开启 X 轴滚动吸附 */
            -webkit-overflow-scrolling: touch; /* 移动端惯性滚动支持 */
            
            /* 定制滚动条样式 */
            scrollbar-width: thin; /* Firefox */
            scrollbar-color: var(--primary-color) var(--border-color); /* Firefox */
        }
        
        /* Webkit 内核（Chrome, Safari, Edge）的自定义滚动条 */
        .pub-list::-webkit-scrollbar { height: 8px; }
        .pub-list::-webkit-scrollbar-track { background: var(--bg-body); border-radius: 4px; }
        .pub-list::-webkit-scrollbar-thumb { background: var(--primary-color); border-radius: 4px; }

        .pub-item { 
            flex: 0 0 450px; /* 固定每张文献卡片的宽度为 450px */
            scroll-snap-align: start; /* 吸附点位于卡片开头处 */
            background-color: var(--bg-surface);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 2.5rem;
            display: flex;
            flex-direction: column;
            box-shadow: var(--shadow-sm);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .pub-item:hover { box-shadow: var(--shadow-md); transform: translateY(-3px); }
        
        .pub-year { 
            font-size: 1.2rem; 
            font-weight: 700; 
            color: var(--primary-color); 
            margin-bottom: 1rem; 
            border-bottom: 2px solid var(--primary-color);
            display: inline-block;
            align-self: flex-start;
            padding-bottom: 0.2rem;
        }
        .pub-content { flex: 1; display: flex; flex-direction: column; }
        .pub-content h3 { font-size: 1.15rem; color: var(--text-main); margin-bottom: 0.8rem; line-height: 1.5; margin-top: 0; flex-grow: 1; }
        .pub-authors { color: var(--text-main); font-weight: 500; margin-bottom: 0.5rem; font-size: 0.95rem; }
        .pub-journal { color: var(--text-secondary); font-style: italic; margin-bottom: 1.5rem; font-size: 0.9rem; }
        .pub-links { display: flex; gap: 1rem; flex-wrap: wrap; margin-top: auto; }
        .pub-link-btn { text-decoration: none; color: var(--primary-color); font-weight: 600; font-size: 0.85rem; border: 1px solid var(--primary-color); padding: 0.35rem 1rem; border-radius: 4px; transition: all 0.2s; }
        .pub-link-btn:hover { background-color: var(--primary-color); color: #ffffff; }
        
        .contact-container { display: grid; grid-template-columns: 1fr 1.2fr; gap: 4rem; background-color: var(--bg-surface); padding: 3rem; border-radius: 12px; box-shadow: var(--shadow-sm); border: 1px solid var(--border-color); }
        .contact-info h3, .contact-form h3 { font-size: 1.5rem; margin-bottom: 1.5rem; color: var(--text-main); margin-top: 0; }
        .contact-info p.desc { color: var(--text-secondary); margin-bottom: 2rem; line-height: 1.6; }
        .info-item { display: flex; align-items: flex-start; gap: 1rem; margin-bottom: 1.5rem; }
        .info-icon { font-size: 1.5rem; }
        .info-text strong { display: block; color: var(--text-main); margin-bottom: 0.25rem; }
        .info-text p { color: var(--text-secondary); margin: 0; }
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; color: var(--text-main); font-weight: 500; font-size: 0.95rem; }
        .form-control { width: 100%; padding: 0.75rem 1rem; border: 1px solid var(--border-color); border-radius: 6px; font-family: inherit; font-size: 1rem; color: var(--text-main); background-color: var(--bg-body); transition: border-color 0.2s, box-shadow 0.2s; }
        .form-control:focus { outline: none; border-color: var(--primary-color); box-shadow: 0 0 0 3px rgba(0, 70, 139, 0.1); }
        textarea.form-control { resize: vertical; min-height: 120px; }
        
        .hero { background-color: var(--bg-surface); padding: 6rem 5%; text-align: center; border-bottom: 1px solid var(--border-color); }
        .hero h1 { font-size: 2.8rem; font-weight: 700; margin-bottom: 1.5rem; color: var(--text-main); }
        .hero p { font-size: 1.15rem; color: var(--text-secondary); max-width: 800px; margin: 0 auto 2.5rem auto; }
        
        @media (max-width: 1024px) { 
            .research-grid .card { flex: 0 0 calc((100% - 2rem) / 2); } 
        }
        @media (max-width: 600px) { 
            .nav-links a { display: none; } 
            .research-grid .card { flex: 0 0 100%; } 
            .pub-item { flex: 0 0 85%; } /* 移动端让出一点边缘，提示用户可以滑动 */
            .contact-container { grid-template-columns: 1fr; gap: 3rem; padding: 2rem; } 
        }
    </style>
</head>
<body>

    <nav id="navbar">
        <div class="nav-brand" data-i18n="nav.brand"></div>
        <div class="nav-links">
            <a href="#home" data-i18n="nav.home"></a>
            <a href="#architecture" data-i18n="nav.architecture"></a>
            <a href="#team" data-i18n="nav.team"></a>
            <a href="#publications" data-i18n="nav.pubs"></a>
            <a href="#contact" data-i18n="nav.contact"></a>
            <button class="lang-toggle" id="langToggleBtn" data-i18n="nav.langBtn"></button>
        </div>
    </nav>

    <header class="hero" id="home">
        <h1 class="fade-in-up" style="--i: 0" data-i18n="hero.title"></h1>
        <p class="fade-in-up" style="--i: 1" data-i18n="hero.subtitle"></p>
        <div class="fade-in-up" style="--i: 2">
            <a href="#contact" class="btn-primary" data-i18n="hero.btn"></a>
        </div>
    </header>

    <section id="architecture">
        <h2 class="section-title fade-in-up" style="--i: 0" data-i18n="sections.architecture"></h2>
        <div class="research-grid" id="research-container"></div>
    </section>

    <section id="team"><h2 class="section-title fade-in-up" style="--i: 0" data-i18n="sections.team"></h2><div class="team-grid" id="team-container"></div></section>
    
    <section id="publications">
        <h2 class="section-title fade-in-up" style="--i: 0" data-i18n="sections.pubs"></h2>
        <div class="pub-list" id="pub-container"></div>
    </section>
    
    <section id="contact">
        <h2 class="section-title fade-in-up" style="--i: 0" data-i18n="sections.contact"></h2>
        <div class="contact-container fade-in-up" style="--i: 1">
            <div class="contact-info">
                <h3 data-i18n="contactInfo.title"></h3>
                <p class="desc" data-i18n="contactInfo.desc"></p>
                <div class="info-item"><div class="info-icon">📍</div><div class="info-text"><strong data-i18n="contactInfo.addressLabel"></strong><p data-i18n="contactInfo.addressVal"></p></div></div>
                <div class="info-item"><div class="info-icon">✉️</div><div class="info-text"><strong data-i18n="contactInfo.emailLabel"></strong><p><a href="mailto:contact@example.com" style="color:var(--primary-color);text-decoration:none;">contact@example.com</a></p></div></div>
            </div>
            <div class="contact-form">
                <h3 data-i18n="contactForm.title"></h3>
                <form action="#" onsubmit="event.preventDefault(); alert('表单已提交！');">
                    <div class="form-group"><label data-i18n="contactForm.nameLabel"></label><input type="text" class="form-control" required></div>
                    <div class="form-group"><label data-i18n="contactForm.emailLabel"></label><input type="email" class="form-control" required></div>
                    <div class="form-group"><label data-i18n="contactForm.msgLabel"></label><textarea class="form-control" required></textarea></div>
                    <button type="submit" class="btn-primary" style="width: 100%;" data-i18n="contactForm.submitBtn"></button>
                </form>
            </div>
        </div>
    </section>

    <footer style="text-align: center; padding: 3rem 5%; border-top: 1px solid var(--border-color); color: var(--text-secondary);"><p data-i18n="footer"></p></footer>

    <script src="data/data.js"></script>

    <script>
        let currentLang = 'zh';
        let intersectionObserver = null;

        // 【核心改进】：统一的安全取值函数
        const getText = (node, lang) => {
            if (!node) return ''; // 节点不存在，返回空
            if (typeof node === 'string') return node; // 如果本身就是字符串（如年份），直接返回
            return node[lang] || node['zh'] || ''; // 尝试取当前语言，失败则用中文兜底，再失败则留空
        };

        document.addEventListener("DOMContentLoaded", () => {
            const setNavHeight = () => { document.documentElement.style.setProperty('--nav-height', `${document.getElementById('navbar').offsetHeight}px`); };
            window.addEventListener('resize', setNavHeight);
            setNavHeight();

            // 尝试从 localStorage 恢复语言状态，与 publications 页面保持同步
            const savedLang = localStorage.getItem('preferredLang');
            if (savedLang === 'en' || savedLang === 'zh') {
                currentLang = savedLang;
                document.documentElement.lang = currentLang === 'zh' ? 'zh-CN' : 'en-US';
            }

            if (typeof websiteData !== 'undefined') {
                const cardsPerRow = websiteData.config?.researchCardsPerRow || 4; 
                document.getElementById('research-container').style.setProperty('--cards-per-row', cardsPerRow);
                renderPage();
            } else {
                document.getElementById('team-container').innerHTML = `<p style="color: red;">无法读取数据文件。</p>`;
                return;
            }
            
            document.getElementById('langToggleBtn').addEventListener('click', () => {
                currentLang = currentLang === 'zh' ? 'en' : 'zh';
                document.documentElement.lang = currentLang === 'zh' ? 'zh-CN' : 'en-US';
                localStorage.setItem('preferredLang', currentLang);
                renderPage();
            });
        });

        function renderPage() {
            // 1. 替换静态文本（引入 getText 安全读取）
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const keys = el.getAttribute('data-i18n').split('.');
                let node = websiteData;
                keys.forEach(k => { node = node ? node[k] : undefined });
                el.innerHTML = getText(node, currentLang);
            });

            // 2. 渲染研究领域（引入 getText 安全读取）
            document.getElementById('research-container').innerHTML = (websiteData.researchData || []).map((item, index) => `
                <div class="card fade-in-up" style="--i: ${index + 1}">
                    <span class="card-icon" aria-hidden="true">${getText(item.icon, currentLang)}</span>
                    <h3>${getText(item.title, currentLang)}</h3>
                    <p>${getText(item.desc, currentLang)}</p>
                </div>
            `).join('');

            // 3. 渲染核心团队（引入 getText 安全读取，外层加空数组兜底防御）
            document.getElementById('team-container').innerHTML = (websiteData.teamData || []).map((category) => `
                <div class="team-category">
                    <h3 class="team-category-title fade-in-up" style="--i: 0">${getText(category.categoryTitle, currentLang)}</h3>
                    <div class="team-grid" style="--team-cards-per-row: ${category.cardsPerRow || 3};">
                        ${(category.members || []).map((member, index) => {
                            const isLeaderLayout = category.cardsPerRow === 1;
                            
                            if (isLeaderLayout) {
                                return `
                                <div class="team-card team-card-leader fade-in-up" style="--i: ${index + 1}">
                                    <div class="avatar">
                                        <img src="${member.avatarImg}" alt="${getText(member.name, currentLang)}" onerror="this.onerror=null; this.style.display='none';">
                                    </div>
                                    <div class="leader-info">
                                        <h4>${getText(member.name, currentLang)}</h4>
                                        <div class="role">${getText(member.role, currentLang)}</div>
                                        <p>${getText(member.desc, currentLang)}</p>
                                    </div>
                                </div>`;
                            } else {
                                return `
                                <div class="team-card fade-in-up" style="--i: ${index + 1}">
                                    <div class="avatar">
                                        <img src="${member.avatarImg}" alt="${getText(member.name, currentLang)}" onerror="this.onerror=null; this.style.display='none';">
                                    </div>
                                    <h4>${getText(member.name, currentLang)}</h4>
                                    <div class="role">${getText(member.role, currentLang)}</div>
                                    <p>${getText(member.desc, currentLang)}</p>
                                </div>`;
                            }
                        }).join('')}
                    </div>
                </div>
            `).join('');

            // 4. 渲染学术成果（引入 getText 安全读取）
            const maxPubs = websiteData.config?.maxHomePubs || 10;
            const pubsList = websiteData.pubData || [];
            const pubsToDisplay = pubsList.slice(0, maxPubs);
            const hasMore = pubsList.length > maxPubs;

            let pubHTML = pubsToDisplay.map((pub, index) => `
                <div class="pub-item fade-in-up" style="--i: ${index + 1}">
                    <div class="pub-year">${getText(pub.year, currentLang)}</div>
                    <div class="pub-content">
                        <h3>${getText(pub.title, currentLang)}</h3>
                        <p class="pub-authors">${getText(pub.authors, currentLang)}</p>
                        <p class="pub-journal">${getText(pub.journal, currentLang)}</p>
                        <div class="pub-links">
                            <a href="${pub.pdfLink || '#'}" class="pub-link-btn" target="_blank" rel="noopener noreferrer">📄 PDF (${getText(pub.pdfSize, currentLang)})</a>
                            ${pub.hasDoi ? `<a href="#" class="pub-link-btn" target="_blank" rel="noopener noreferrer">🔗 DOI</a>` : ''}
                        </div>
                    </div>
                </div>
            `).join('');

            if (hasMore) {
                pubHTML += `
                <div class="pub-item fade-in-up" style="--i: ${pubsToDisplay.length + 1}; display: flex; align-items: center; justify-content: center; background-color: transparent; border: 2px dashed var(--border-color); cursor: pointer;" onclick="window.location.href='publications.html'">
                    <a href="publications.html" style="text-decoration: none; color: var(--primary-color); font-size: 1.2rem; font-weight: bold;">
                        ${getText(websiteData.sections.morePubsBtn, currentLang)}
                    </a>
                </div>`;
            }

            document.getElementById('pub-container').innerHTML = pubHTML;

            initAnimations();
        }

        function initAnimations() {
            if (intersectionObserver) intersectionObserver.disconnect();
            intersectionObserver = new IntersectionObserver((entries, observer) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('is-visible');
                        observer.unobserve(entry.target);
                    }
                });
            }, { root: null, rootMargin: '0px', threshold: 0.1 });
            document.querySelectorAll('.fade-in-up').forEach(el => intersectionObserver.observe(el));
        }
    </script>
</body>
</html>
